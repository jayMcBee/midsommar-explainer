<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Warum sind die Sommertage so lang?</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }
  body {
    font-family: 'Comic Sans MS', 'Baloo', 'Trebuchet MS', system-ui, sans-serif;
    color: #eaf2ff; background: #05081c;
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column; user-select: none; overflow: hidden;
  }
  .stage { position: relative; flex: 1 1 auto; min-height: 300px; }
  .stage canvas { display: block; width: 100%; height: 100%; }

  .titletag {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25);
    padding: 6px 16px; border-radius: 30px; font-size: clamp(13px,2vw,18px);
    font-weight: bold; white-space: nowrap; z-index:3;
  }
  .readout { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); text-align: center; width: min(92%, 620px); z-index:3; pointer-events:none; }
  .hours { font-size: clamp(15px, 2.8vw, 24px); font-weight: bold; color: #ffd93b; text-shadow: 0 2px 6px rgba(0,0,0,.7); }
  .bar { margin: 8px auto 0; width: min(90%, 460px); height: 16px; border-radius: 12px; overflow: hidden; display: flex; border: 2px solid rgba(255,255,255,.4); }
  .bar .day { background: linear-gradient(180deg,#ffe98a,#ffd11a); }
  .bar .night { background: linear-gradient(180deg,#2a356e,#161d44); }
  .barlabels { display:flex; justify-content:space-between; width:min(90%,460px); margin:3px auto 0; font-size:11px; opacity:.85; }

  .needwebgl {
    position:absolute; inset:0; display:flex; flex-direction:column; gap:6px;
    align-items:center; justify-content:center; text-align:center;
    font-size:clamp(16px,2.6vw,22px); font-weight:bold; line-height:1.5; padding:24px;
  }
  .needwebgl small { opacity:.7; font-weight:normal; }

  .panel {
    position: sticky; bottom: 0; flex: 0 0 auto;
    background: #0e1638; border-top: 5px solid #ffd93b;
    padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: 10px; align-items: center;
    box-shadow: 0 -6px 22px rgba(0,0,0,.55); z-index: 10;
  }
  .concepts {
    position:absolute; z-index:3; pointer-events:none; display:none;
    transform: translate(-50%, calc(100% + 6px)); white-space:nowrap;
    font-size: clamp(11px,1.8vw,14px); opacity:.9;
    text-shadow: 0 2px 6px rgba(0,0,0,.85);
  }
  .concepts b { color:#ffd93b; }
  .caption { font-size: clamp(15px,2.5vw,21px); font-weight: bold; text-align: center; line-height: 1.3; max-width: 900px; min-height: 1.4em; }
  .hemi { font-size: clamp(11px,1.7vw,13px); opacity:.6; text-align:center; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; align-items:center; }
  button {
    font-family: inherit; font-weight: bold; font-size: clamp(14px,2.2vw,18px);
    padding: 9px 16px; border: none; border-radius: 30px; cursor: pointer; color: #fff;
    background: linear-gradient(180deg,#5b6bd6,#3a49b3); box-shadow: 0 4px 0 #232f80;
    transition: transform .08s, box-shadow .08s;
  }
  button:active { transform: translateY(3px); box-shadow: 0 1px 0 #232f80; }
  button.season.on, button.city.on, button.midsommar.on { outline: 3px solid #ffd93b; }
  button.summer { background: linear-gradient(180deg,#ffb04a,#ff8a1e); box-shadow:0 4px 0 #c5670c; }
  button.winter { background: linear-gradient(180deg,#6fd0ff,#2aa6ee); box-shadow:0 4px 0 #1675ab; }
  button.equi   { background: linear-gradient(180deg,#9be36f,#5fbf3a); box-shadow:0 4px 0 #3a8a1e; }
  button.midsommar { background: linear-gradient(180deg,#ff9ecd,#ff5ea8); box-shadow:0 4px 0 #c23b7a; }
  button.ghost  { background: rgba(255,255,255,.12); box-shadow:0 4px 0 rgba(0,0,0,.35); }
  .rowlbl { font-size: clamp(14px,2.2vw,18px); opacity:.9; }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="titletag" id="title"></div>
    <div class="concepts" id="concepts"></div>
    <div class="readout">
      <div class="hours" id="hours"></div>
      <div class="bar"><div class="day" id="barday" style="width:67%"></div><div class="night" id="barnight" style="width:33%"></div></div>
      <div class="barlabels"><span id="lblNightL"></span><span id="lblDay"></span><span id="lblNightR"></span></div>
    </div>
  </div>

  <div class="panel">
    <div class="caption" id="caption"></div>
    <div class="hemi" id="hemi"></div>
    <div class="row">
      <button class="season summer on" data-season="1"></button>
      <button class="season equi"   data-season="0"></button>
      <button class="season winter" data-season="-1"></button>
      <button class="midsommar" id="midsommarBtn"></button>
      <button class="ghost" id="playBtn"></button>
    </div>
    <div class="row" id="cityrow">
      <span class="rowlbl" id="homeLbl"></span>
    </div>
  </div>

<script>
/* ===================================================================
   SHARED STATE, PHYSICS, UI  (renderer-agnostic)
   World convention used everywhere:
     x = right,  sunlight comes from the LEFT and travels +x,
     so the lit hemisphere is x < 0.
     Earth axis tilts within the screen plane by  a = season * TILT
     (north pole leans toward the Sun in summer).
=================================================================== */
const TILT = 23.5 * Math.PI/180;
const state = { season: 1, latDeg: 59.33, lonDeg: 18.07, rho: 0, playing: true };  // home: Stockholm (default)

/* selectable home cities, ordered by daylight contrast (short -> long summer) */
const CITIES = [
  { name:'München',   lat:48.14, lon:11.58 },
  { name:'Hamburg',   lat:53.55, lon: 9.99 },
  { name:'Stockholm', lat:59.33, lon:18.07 }
];
const DEFAULT_CITY = 2;  // Stockholm — the dramatic midsommar case

/* ---- all user-facing copy lives here; add an 'en' block + toggle to go bilingual ---- */
const LANG = 'de';
const STR = {
  de: {
    docTitle:'Warum sind die Sommertage so lang?',
    title:'Warum sind die Sommertage so lang?',
    concepts:'🍂 Die geneigte <b>Erdachse</b> → <b>Jahreszeiten</b>',
    hemi:'🌍 Nordhalbkugel — südlich des Äquators ist alles umgekehrt.',
    barNight:'🌙 Nacht', barDay:'ein Tag = 24 h',
    home:'🏠 wir wohnen in:',
    play:'▶ Drehen', pause:'⏸ Drehung anhalten',
    seasons:{ '1':'☀️ Sommer', '0':'🍂 Frühling/Herbst', '-1':'❄️ Winter' },
    midsommar:'🌼 Midsommar',
    caption:{
      '1':'☀️ Sommer — unsere Seite neigt sich zur Sonne, darum ist der Tag lang!',
      '0':'🍂 Frühling / Herbst — wir neigen uns zu keiner Seite, Tag und Nacht sind gleich lang.',
      '-1':'❄️ Winter — unsere Seite neigt sich von der Sonne weg, darum ist der Tag kurz.'
    },
    hours:h=>`☀️ Etwa ${h} Stunden Sonne`,
    midnightSun:'  (Mitternachtssonne!)', polarNight:'  (Polarnacht!)',
    webgl:'🌍🔆<br>Dafür brauchst du einen 3D-fähigen Browser mit Internetverbindung.<br><small>(es lädt einen 3D-Globus)</small>'
  }
};
const T = STR[LANG];

function daylightFraction(phiDeg, a){
  const phi = phiDeg*Math.PI/180;
  let K = Math.tan(phi)*Math.tan(a);
  K = Math.max(-1, Math.min(1, K));
  return 1 - Math.acos(K)/Math.PI;          // fraction of 24h in daylight
}
function updateReadout(){
  const frac = daylightFraction(state.latDeg, state.season*TILT);
  const hrs = frac*24;
  document.getElementById('hours').textContent =
    T.hours(Math.round(hrs)) +
    (hrs>=23.9?T.midnightSun:hrs<=0.1?T.polarNight:'');
  document.getElementById('barday').style.width = (frac*100).toFixed(1)+'%';
  document.getElementById('barnight').style.width = ((1-frac)*100).toFixed(1)+'%';
}
function syncSeasonButtons(){
  document.querySelectorAll('.season').forEach(b=>
    b.classList.toggle('on', Number(b.dataset.season)===state.season));
}
// Midsommar = the preset "summer + Stockholm"; light its button when we're in that state
function syncMidsommar(){
  const active = state.season===1 && state.latDeg===CITIES[DEFAULT_CITY].lat;
  document.getElementById('midsommarBtn').classList.toggle('on', active);
}
// set the home city by index: state + button highlight + readout
function selectCity(i){
  const c=CITIES[i];
  state.latDeg=c.lat; state.lonDeg=c.lon;
  document.querySelectorAll('.city').forEach((x,j)=>x.classList.toggle('on',j===i));
  updateReadout(); syncMidsommar();
}
// build the home-city toggle once from CITIES, then select the default
function buildCities(){
  const row=document.getElementById('cityrow');
  CITIES.forEach((c,i)=>{
    const b=document.createElement('button');
    b.className='city'; b.textContent=c.name;
    b.onclick=()=>selectCity(i);
    row.appendChild(b);
  });
  selectCity(DEFAULT_CITY);
}
function applySeason(){
  document.getElementById('caption').textContent=T.caption[String(state.season)];
  syncSeasonButtons(); updateReadout(); syncMidsommar();
}
// paint every static string from the table (single source of truth for a future EN toggle)
function applyLang(){
  document.title=T.docTitle;
  document.getElementById('title').textContent=T.title;
  document.getElementById('concepts').innerHTML=T.concepts;
  document.getElementById('hemi').textContent=T.hemi;
  document.getElementById('lblNightL').textContent=T.barNight;
  document.getElementById('lblNightR').textContent=T.barNight.split(' ').reverse().join(' ');
  document.getElementById('lblDay').textContent=T.barDay;
  document.getElementById('homeLbl').textContent=T.home;
  document.getElementById('playBtn').textContent=state.playing?T.pause:T.play;
  document.querySelectorAll('.season').forEach(b=> b.textContent=T.seasons[b.dataset.season]);
  document.getElementById('midsommarBtn').textContent=T.midsommar;
}
// called once at boot to paint the initial UI
function applyStep(){ applyLang(); applySeason(); }
document.querySelectorAll('.season').forEach(b=> b.onclick=()=>{
  state.season=Number(b.dataset.season); applySeason();
});
document.getElementById('playBtn').onclick=e=>{ state.playing=!state.playing; e.target.textContent=state.playing?T.pause:T.play; };
// Midsommar preset: jump to summer + Stockholm (the longest day, far north)
document.getElementById('midsommarBtn').onclick=()=>{ state.season=1; applySeason(); selectCity(DEFAULT_CITY); };

// build city toggle once, then paint the UI immediately (independent of the Three.js CDN load)
buildCities();
applyStep();


/* ===================================================================
   RENDERER C  — Three.js textured globe (preferred)
=================================================================== */
function startThree(){
  const stage=document.getElementById('stage');
  const renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(stage.clientWidth, stage.clientHeight);
  renderer.domElement.style.position='absolute'; renderer.domElement.style.inset='0';
  stage.insertBefore(renderer.domElement, stage.firstChild.nextSibling);

  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(42, stage.clientWidth/stage.clientHeight, 0.1, 100);
  camera.position.set(0,3.0,8.2); camera.lookAt(0,0,0);   // slightly raised: Sun's orbit reads as a ring

  // Direction from Earth (centre) toward the Sun. The Earth + atmosphere shaders shade
  // themselves from this, so no scene lights are needed. Updated each frame from the Sun's orbit.
  const sunDir=new THREE.Vector3(1,0,0);
  const ORBIT=5.2;   // radius of the Sun's path around the Earth

  // iconic Sun: a camera-facing sprite (glowing disc + rays) plus a bright core, orbiting the Earth
  const sunGroup=new THREE.Group(); scene.add(sunGroup);
  function makeSunTexture(){
    const s=256, cv=document.createElement('canvas'); cv.width=cv.height=s; const c=cv.getContext('2d'), cx=s/2, cy=s/2;
    const g=c.createRadialGradient(cx,cy,0,cx,cy,s/2);
    g.addColorStop(0,'rgba(255,244,190,1)'); g.addColorStop(0.32,'rgba(255,212,40,0.95)');
    g.addColorStop(0.6,'rgba(255,170,20,0.25)'); g.addColorStop(1,'rgba(255,160,0,0)');
    c.fillStyle=g; c.fillRect(0,0,s,s);
    c.strokeStyle='rgba(255,215,70,0.95)'; c.lineWidth=7; c.lineCap='round';
    for(let k=0;k<12;k++){ const a=k/12*2*Math.PI;
      c.beginPath(); c.moveTo(cx+Math.cos(a)*s*0.31, cy+Math.sin(a)*s*0.31);
      c.lineTo(cx+Math.cos(a)*s*0.46, cy+Math.sin(a)*s*0.46); c.stroke(); }
    return new THREE.CanvasTexture(cv);
  }
  const sunSprite=new THREE.Sprite(new THREE.SpriteMaterial({map:makeSunTexture(), transparent:true, blending:THREE.AdditiveBlending, depthWrite:false}));
  sunSprite.scale.set(2.8,2.8,1); sunGroup.add(sunSprite);
  const sunCore=new THREE.Mesh(new THREE.SphereGeometry(0.52,32,32), new THREE.MeshBasicMaterial({color:0xffe79a}));
  sunGroup.add(sunCore);

  // faint orbit ring (the Sun's yearly path)
  (function(){ const seg=128, p=[];
    for(let k=0;k<=seg;k++){ const a=k/seg*2*Math.PI; p.push(Math.cos(a)*ORBIT,0,Math.sin(a)*ORBIT); }
    const geo=new THREE.BufferGeometry().setAttribute('position',new THREE.Float32BufferAttribute(p,3));
    scene.add(new THREE.Line(geo,new THREE.LineBasicMaterial({color:0x4a5680}))); })();

  // starfield
  (function(){ const g=new THREE.BufferGeometry(), n=600, pos=new Float32Array(n*3);
    for(let i=0;i<n;i++){ const r=40+Math.random()*30, t=Math.random()*Math.PI*2, p=Math.acos(2*Math.random()-1);
      pos[i*3]=r*Math.sin(p)*Math.cos(t); pos[i*3+1]=r*Math.sin(p)*Math.sin(t); pos[i*3+2]=r*Math.cos(p); }
    g.setAttribute('position',new THREE.BufferAttribute(pos,3));
    scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size:0.18}))); })();

  // tilt group (axis lean) -> spin mesh (rotation about tilted axis)
  const tiltGroup=new THREE.Group(); scene.add(tiltGroup);
  const spin=new THREE.Group(); tiltGroup.add(spin);
  const RADIUS=1.5;   // 25% smaller than before (was 2)

  // textures
  const base='https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/';
  const loader=new THREE.TextureLoader(); loader.crossOrigin='anonymous';
  const black=new THREE.DataTexture(new Uint8Array([0,0,0,255]),1,1,THREE.RGBAFormat); black.needsUpdate=true;
  function tex(file){ return new Promise(res=>loader.load(base+file, t=>res(t), undefined, ()=>res(black))); }

  tex('earth_atmos_2048.jpg')
   .then(day=>{
    // Earth shader: stylized "cartoon" day/night from sunDir — bright warm day, deep-blue night, crisp divide
    const earthMat=new THREE.ShaderMaterial({
      uniforms:{ dayTex:{value:day}, sunDir:{value:sunDir} },
      vertexShader:`
        varying vec2 vUv; varying vec3 vWN;
        void main(){ vUv=uv; vWN=mat3(modelMatrix)*normal;
          gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
      fragmentShader:`
        uniform sampler2D dayTex; uniform vec3 sunDir;
        varying vec2 vUv; varying vec3 vWN;
        void main(){
          float i=dot(normalize(vWN), normalize(sunDir));   // >0 day, <0 night
          float d=smoothstep(-0.12,0.12,i);                 // soft dusk band, not a hard cut
          vec3 tex=texture2D(dayTex,vUv).rgb;
          // DAY: bright, warm, vivid across the whole lit half
          vec3 dayC=clamp(tex*1.45 + vec3(0.07,0.05,0.0), 0.0, 1.0);
          // NIGHT: dimmed cool-blue Earth — continents stay readable, just dark
          float lum=dot(tex, vec3(0.299,0.587,0.114));
          vec3 nightC=tex*0.13 + vec3(0.0,0.004,0.016);
          nightC=mix(nightC, vec3(lum)*vec3(0.30,0.40,0.70), 0.40);
          vec3 col=mix(nightC, dayC, d);
          // gentle warm glow along the terminator
          float edge=1.0 - smoothstep(0.0,0.10,abs(i));
          col += vec3(0.40,0.30,0.12) * edge * 0.25;
          gl_FragColor=vec4(col,1.0);
        }`,
    });
    const earth=new THREE.Mesh(new THREE.SphereGeometry(RADIUS,64,64), earthMat); spin.add(earth);
    // atmosphere rim glow
    const atm=new THREE.Mesh(new THREE.SphereGeometry(RADIUS*1.15,48,48), new THREE.ShaderMaterial({
      side:THREE.BackSide, transparent:true, blending:THREE.AdditiveBlending,
      uniforms:{sunDir:{value:sunDir}},
      vertexShader:`varying vec3 vWN; varying vec3 vP; void main(){ vWN=mat3(modelMatrix)*normal; vec4 wp=modelMatrix*vec4(position,1.0); vP=wp.xyz; gl_Position=projectionMatrix*viewMatrix*wp; }`,
      fragmentShader:`varying vec3 vWN; varying vec3 vP; uniform vec3 sunDir; void main(){ vec3 v=normalize(cameraPosition-vP); float rim=pow(1.0-max(dot(normalize(vWN),v),0.0),3.0); float lit=clamp(dot(normalize(vWN),normalize(sunDir)),0.0,1.0); gl_FragColor=vec4(0.35,0.6,1.0,1.0)*rim*(0.25+0.75*lit); }`,
    })); scene.add(atm);
   });

  // rotation axis line + home marker
  const axisLine=new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,-RADIUS*1.6,0),new THREE.Vector3(0,RADIUS*1.6,0)]),
    new THREE.LineDashedMaterial({color:0xff6b9d, dashSize:0.18, gapSize:0.12, linewidth:2}));
  axisLine.computeLineDistances(); tiltGroup.add(axisLine);

  // "geneigte Erdachse" label, pinned to the screen position of the axis' bottom tip
  const note=document.getElementById('concepts');
  const axisTip=new THREE.Vector3(0,-RADIUS*1.6,0), tipNDC=new THREE.Vector3();
  note.style.display='block';
  function placeAxisNote(){
    tipNDC.copy(axisTip).applyMatrix4(tiltGroup.matrixWorld).project(camera);
    note.style.left=(tipNDC.x*0.5+0.5)*stage.clientWidth +'px';
    note.style.top =(-tipNDC.y*0.5+0.5)*stage.clientHeight+'px';
  }

  // home: a plain red pushpin that sticks straight out of the surface (tip on the ground, head outward)
  const pin=new THREE.Group();
  const pinRed=new THREE.MeshBasicMaterial({color:0xff2d2d});
  const pinCone=new THREE.Mesh(new THREE.ConeGeometry(0.06,0.20,20), pinRed);
  pinCone.rotation.x=Math.PI; pinCone.position.y=0.10;            // apex (tip) at y=0, widening outward
  const pinHead=new THREE.Mesh(new THREE.SphereGeometry(0.085,20,20), pinRed);
  pinHead.position.y=0.24;
  const pinHalo=new THREE.Mesh(new THREE.SphereGeometry(0.10,20,20),
    new THREE.MeshBasicMaterial({color:0xffffff, side:THREE.BackSide})); // thin white outline for contrast
  pinHalo.position.y=0.24;
  pin.add(pinCone,pinHead,pinHalo);
  spin.add(pin);

  const PIN_UP=new THREE.Vector3(0,1,0), homePos=new THREE.Vector3();
  function setHomeLatitude(){
    const phi=state.latDeg*Math.PI/180;
    // map (lat, lon) onto the textured sphere using Three.js SphereGeometry's UV convention:
    // longitude 0° (Greenwich) sits at +X, +90°E at -Z, -90°W at +Z. (u = 0.5 + lon/360)
    const ang=2*Math.PI*(0.5 + state.lonDeg/360), cphi=Math.cos(phi);
    homePos.set(-Math.cos(ang)*cphi*RADIUS, Math.sin(phi)*RADIUS, Math.sin(ang)*cphi*RADIUS);
    pin.position.copy(homePos);
    pin.quaternion.setFromUnitVectors(PIN_UP, homePos.clone().normalize()); // point straight out from the centre
  }

  function resize(){ const w=stage.clientWidth,h=stage.clientHeight; renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix(); }
  window.addEventListener('resize',resize);

  const wp=new THREE.Vector3();
  // Sun's orbit angle (xz-plane), kept in [0,π] so the swing always passes across the FRONT (+z):
  // Summer = 0 (+x, right) · Equinox = π/2 (+z, front) · Winter = π (-x, left).
  const seasonAngle = s => s>0 ? 0 : s<0 ? Math.PI : Math.PI/2;
  let sunAng = seasonAngle(state.season);
  let last=performance.now();
  function loop(now){
    const dt=(now-last)/1000; last=now;
    if(state.playing) state.rho=(state.rho+dt*0.35)%(2*Math.PI);   // Earth spins -> day & night
    // glide the Sun along its orbit toward the current season's spot (the yearly journey)
    const target=seasonAngle(state.season);
    sunAng += (target - sunAng) * Math.min(1, dt*2.2);
    sunGroup.position.set(Math.cos(sunAng)*ORBIT, 0, Math.sin(sunAng)*ORBIT);
    sunDir.copy(sunGroup.position).normalize();
    // Earth keeps a FIXED tilt (north leans toward +x); seasons come from WHERE the Sun is, not re-tilting
    tiltGroup.rotation.z = -TILT;
    spin.rotation.y = state.rho;
    setHomeLatitude();
    renderer.render(scene,camera);
    placeAxisNote();
    requestAnimationFrame(loop);
  }
  resize(); requestAnimationFrame(loop);
}

/* ===================================================================
   BOOT: try C, fall back to A
=================================================================== */
function hasWebGL(){ try{ const c=document.createElement('canvas'); return !!(window.WebGLRenderingContext && (c.getContext('webgl')||c.getContext('experimental-webgl'))); }catch(e){ return false; } }
function needsWebGL(){
  const s=document.getElementById('stage');
  const m=document.createElement('div'); m.className='needwebgl';
  m.innerHTML=T.webgl;
  s.appendChild(m);
}
let __booted=false;
function boot(){
  if(__booted) return; __booted=true;
  applyStep();
  if(typeof THREE!=='undefined' && hasWebGL()){
    try{ startThree(); return; }catch(e){ console.warn('3D init failed', e); }
  }
  needsWebGL();
}
</script>
<!-- load Three.js (UMD global). If it fails (offline/blocked), boot() shows a 'needs 3D' message. -->
<script src="https://unpkg.com/three@0.128.0/build/three.min.js" onload="boot()" onerror="boot()"></script>
<script>
  // safety net: if the CDN tag never fires (e.g. blocked silently), boot anyway after a short delay
  setTimeout(boot, 2500);
</script>
</body>
</html>
