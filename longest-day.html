<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Why is the Day So Long? ☀️ The Real Reason (for little ones)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }
  body {
    font-family: 'Comic Sans MS', 'Baloo', 'Trebuchet MS', system-ui, sans-serif;
    color: #eaf2ff;
    background: #0b1026;
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column;
    user-select: none;
  }
  .stage { position: relative; flex: 1 1 auto; min-height: 300px; }
  canvas { display: block; width: 100%; height: 100%; }

  .titletag {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25);
    padding: 6px 16px; border-radius: 30px; font-size: clamp(13px,2vw,18px);
    font-weight: bold; white-space: nowrap; backdrop-filter: blur(4px);
  }
  .readout {
    position: absolute; top: 54px; left: 50%; transform: translateX(-50%);
    text-align: center; width: min(92%, 620px);
  }
  .hours {
    font-size: clamp(20px, 4vw, 34px); font-weight: bold; color: #ffd93b;
    text-shadow: 0 2px 6px rgba(0,0,0,.5);
  }
  .bar {
    margin: 8px auto 0; width: min(90%, 460px); height: 18px; border-radius: 12px;
    overflow: hidden; display: flex; border: 2px solid rgba(255,255,255,.4);
    box-shadow: 0 2px 8px rgba(0,0,0,.4);
  }
  .bar .day { background: linear-gradient(180deg,#ffe98a,#ffd11a); }
  .bar .night { background: linear-gradient(180deg,#2a356e,#161d44); }
  .barlabels { display:flex; justify-content:space-between; width:min(90%,460px); margin:3px auto 0; font-size:12px; opacity:.85; }

  /* ---------- bottom panel ---------- */
  .panel {
    position: sticky; bottom: 0; flex: 0 0 auto;
    background: #121a3a; border-top: 5px solid #ffd93b;
    padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: 10px; align-items: center;
    box-shadow: 0 -6px 22px rgba(0,0,0,.5); z-index: 10;
  }
  .speech {
    font-size: clamp(16px, 2.7vw, 24px); font-weight: bold; text-align: center;
    line-height: 1.35; max-width: 920px; min-height: 2.6em;
    display:flex; align-items:center; justify-content:center;
  }
  .grownup { font-size: clamp(11px,1.8vw,14px); opacity: .75; max-width: 880px; text-align:center; font-weight:normal; display:none; }
  .grownup.show { display:block; }

  .row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; align-items:center; }
  button {
    font-family: inherit; font-weight: bold; font-size: clamp(14px,2.2vw,18px);
    padding: 10px 18px; border: none; border-radius: 30px; cursor: pointer; color: #fff;
    background: linear-gradient(180deg,#5b6bd6,#3a49b3); box-shadow: 0 4px 0 #232f80;
    transition: transform .08s, box-shadow .08s;
  }
  button:active { transform: translateY(3px); box-shadow: 0 1px 0 #232f80; }
  button.season.on { outline: 3px solid #ffd93b; }
  button.summer { background: linear-gradient(180deg,#ffb04a,#ff8a1e); box-shadow:0 4px 0 #c5670c; }
  button.winter { background: linear-gradient(180deg,#6fd0ff,#2aa6ee); box-shadow:0 4px 0 #1675ab; }
  button.equi   { background: linear-gradient(180deg,#9be36f,#5fbf3a); box-shadow:0 4px 0 #3a8a1e; }
  button.next   { background: linear-gradient(180deg,#7ed957,#46c11a); box-shadow:0 4px 0 #2f8a10; }
  button.ghost  { background: rgba(255,255,255,.12); box-shadow:0 4px 0 rgba(0,0,0,.35); }
  .dots { display:flex; gap:7px; }
  .dot { width:11px; height:11px; border-radius:50%; background:#3a447a; }
  .dot.on { background:#ffd93b; }

  .slider { display:flex; align-items:center; gap:8px; font-size:13px; opacity:.9; }
  input[type=range]{ accent-color:#ffd93b; }
</style>
</head>
<body>
  <div class="stage">
    <canvas id="c"></canvas>
    <div class="titletag">🌞 Why is the day so long? The REAL reason 🌍</div>
    <div class="readout">
      <div class="hours" id="hours">☀️ Sun is up about 16 hours</div>
      <div class="bar"><div class="day" id="barday" style="width:67%"></div><div class="night" id="barnight" style="width:33%"></div></div>
      <div class="barlabels"><span>🌙 night</span><span>one whole day (24 h)</span><span>night 🌙</span></div>
    </div>
  </div>

  <div class="panel">
    <div class="speech" id="speech"></div>
    <div class="grownup" id="grownup"></div>
    <div class="row">
      <button class="season summer on" data-season="1">☀️ Summer</button>
      <button class="season equi"   data-season="0">🍂 Spring/Autumn</button>
      <button class="season winter" data-season="-1">❄️ Winter</button>
      <button class="ghost" id="playBtn">⏸ Pause spin</button>
    </div>
    <div class="row">
      <div class="slider">🏠 Where we live:
        <span id="latlbl" style="min-width:130px; display:inline-block">far north (51°)</span>
        <input type="range" id="lat" min="0" max="80" value="51" />
      </div>
    </div>
    <div class="row">
      <button class="ghost" id="back">⟲ Back</button>
      <div class="dots" id="dots"></div>
      <button class="next" id="next">Next ▶</button>
      <button class="ghost" id="ginfo">🧑‍🏫 Grown-up facts</button>
    </div>
  </div>

<script>
const TILT = 23.5 * Math.PI/180;   // Earth's real axial tilt
const cnv = document.getElementById('c');
const ctx = cnv.getContext('2d');

let state = {
  season: 1,        // +1 summer, 0 equinox, -1 winter  (declination = season*TILT)
  latDeg: 51,       // viewer latitude
  rho: 0,           // rotation angle (time of day)
  playing: true,
};

/* ---------- geometry ----------
   World axes:  x = right,  y = toward viewer,  z = up.
   Sun is to the LEFT; sunlight travels +x. Lit hemisphere = x < 0.
   Earth's axis tilts within the screen plane by a = season*TILT
   (north pole toward the Sun in summer).                              */
function axisFrame(a){
  const n  = [-Math.sin(a), 0, Math.cos(a)];   // north pole direction
  const e1 = [ Math.cos(a), 0, Math.sin(a)];   // equator ref, in screen plane
  const e2 = [0, 1, 0];                        // toward viewer
  return {n,e1,e2};
}
// point at latitude phi, rotation rho, on the tilted spinning Earth
function surfacePoint(phi, rho, F){
  const cp=Math.cos(phi), sp=Math.sin(phi), cr=Math.cos(rho), sr=Math.sin(rho);
  return [
    sp*F.n[0] + cp*(cr*F.e1[0] + sr*F.e2[0]),
    sp*F.n[1] + cp*(cr*F.e1[1] + sr*F.e2[1]),
    sp*F.n[2] + cp*(cr*F.e1[2] + sr*F.e2[2]),
  ];
}
// daylight fraction (the real formula): day when point.x < 0  ->  cos(rho) < tanφ·tanδ
function daylightFraction(phiDeg, a){
  const phi = phiDeg*Math.PI/180;
  let K = Math.tan(phi)*Math.tan(a);
  K = Math.max(-1, Math.min(1, K));
  return 1 - Math.acos(K)/Math.PI;     // fraction of 24h that is daytime
}

/* ---------- drawing ---------- */
let W,H,DPR,R,cx,cy;
function resize(){
  DPR = window.devicePixelRatio || 1;
  W = cnv.clientWidth; H = cnv.clientHeight;
  cnv.width = W*DPR; cnv.height = H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  R = Math.min(W*0.20, H*0.34);          // Earth radius in px
  cx = W*0.62; cy = H*0.50;              // Earth a bit right of centre
}
window.addEventListener('resize', resize);

function P2S(p){ return [cx + p[0]*R, cy - p[2]*R]; }  // project x,z to screen

function draw(){
  const a = state.season * TILT;
  const F = axisFrame(a);
  ctx.clearRect(0,0,W,H);

  // background sky
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a1130'); g.addColorStop(1,'#161f4a');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // ---- Sun (left) + horizontal parallel rays ----
  const sunX = Math.max(70, cx - R*2.7), sunY = cy;
  const sunR = Math.min(R*0.85, 70);
  ctx.fillStyle = '#ffd11a';
  ctx.shadowColor='#ffd11a'; ctx.shadowBlur=40;
  ctx.beginPath(); ctx.arc(sunX,sunY,sunR,0,7); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#7a4b00';
  ctx.beginPath(); ctx.arc(sunX-sunR*0.3, sunY-sunR*0.2, 5,0,7); ctx.fill();
  ctx.beginPath(); ctx.arc(sunX+sunR*0.3, sunY-sunR*0.2, 5,0,7); ctx.fill();
  ctx.strokeStyle='#7a4b00'; ctx.lineWidth=4; ctx.beginPath();
  ctx.arc(sunX, sunY+sunR*0.15, sunR*0.35, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
  // rays
  ctx.strokeStyle='rgba(255,224,90,.55)'; ctx.lineWidth=3;
  for(let k=-3;k<=3;k++){
    const ry = sunY + k*(R*0.42);
    const x0 = sunX + sunR + 12, x1 = cx - R - 14;
    ctx.beginPath(); ctx.moveTo(x0,ry); ctx.lineTo(x1,ry); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x1,ry); ctx.lineTo(x1-12,ry-7); ctx.lineTo(x1-12,ry+7); ctx.closePath();
    ctx.fillStyle='rgba(255,224,90,.55)'; ctx.fill();
  }

  // ---- Earth disk: left half = day, right half = night ----
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,R,0,7); ctx.clip();
  // night (right)
  ctx.fillStyle='#0f1640'; ctx.fillRect(cx,cy-R, R, 2*R);
  // day (left)
  const dg = ctx.createLinearGradient(cx-R,0,cx,0);
  dg.addColorStop(0,'#2f8fd6'); dg.addColorStop(1,'#7ec8ff');
  ctx.fillStyle=dg; ctx.fillRect(cx-R,cy-R, R, 2*R);
  // a hint of land on both halves
  ctx.restore();

  // rotating surface grid dots (front hemisphere only) -> shows REAL spin about the axis
  const lats=[-60,-30,0,30,60];
  for(const Ld of lats){
    const phi=Ld*Math.PI/180;
    for(let m=0;m<12;m++){
      const lon = m/12*2*Math.PI;
      const p = surfacePoint(phi, state.rho+lon, F);
      if(p[1] <= 0) continue;            // back hemisphere -> hidden behind globe
      const [sx,sy]=P2S(p);
      const lit = p[0] < 0;
      ctx.fillStyle = lit ? 'rgba(255,255,255,.55)' : 'rgba(150,170,220,.30)';
      ctx.beginPath(); ctx.arc(sx,sy, 2.4, 0,7); ctx.fill();
    }
  }

  // terminator line (vertical) + Earth outline
  ctx.strokeStyle='rgba(255,255,255,.35)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(cx,cy-R); ctx.lineTo(cx,cy+R); ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,.7)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(cx,cy,R,0,7); ctx.stroke();

  // ---- rotation axis (tilted, fixed in space) + north star ----
  const top = [F.n[0]*R*1.5, 0, F.n[2]*R*1.5];
  const bot = [-F.n[0]*R*1.5, 0, -F.n[2]*R*1.5];
  const [tx,ty]=P2S(top), [bx,by]=P2S(bot);
  ctx.strokeStyle='#ff6b9d'; ctx.lineWidth=4; ctx.setLineDash([8,6]);
  ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(tx,ty); ctx.stroke();
  ctx.setLineDash([]);
  // north star the axis points to
  ctx.fillStyle='#fff'; ctx.font='20px sans-serif'; ctx.textAlign='center';
  ctx.fillText('✦', tx, ty-6);
  ctx.fillStyle='#ffb3cd'; ctx.font='bold 13px sans-serif';
  ctx.fillText('N', tx + (state.season>=0? 16:-16), ty+14);

  // ---- our home: latitude circle path + moving pin ----
  const phi = state.latDeg*Math.PI/180;
  // full ring (faint, shows where home travels in one day)
  ctx.lineWidth=2;
  let prev=null;
  for(let i=0;i<=120;i++){
    const r = i/120*2*Math.PI;
    const p = surfacePoint(phi, r, F);
    const [sx,sy]=P2S(p);
    if(prev){
      const front = p[1]>0;
      ctx.strokeStyle = front ? 'rgba(255,255,255,.85)' : 'rgba(255,255,255,.18)';
      ctx.beginPath(); ctx.moveTo(prev[0],prev[1]); ctx.lineTo(sx,sy); ctx.stroke();
    }
    prev=[sx,sy];
  }
  // the home pin at current time
  const ph = surfacePoint(phi, state.rho, F);
  const [hx,hy]=P2S(ph);
  const litHome = ph[0] < 0;
  const onFront = ph[1] >= 0;
  ctx.globalAlpha = onFront ? 1 : 0.45;
  ctx.fillStyle = litHome ? '#ffd93b' : '#9fb0e6';
  ctx.strokeStyle='#fff'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(hx,hy, 9, 0,7); ctx.fill(); ctx.stroke();
  ctx.font='15px sans-serif'; ctx.fillText(litHome?'🏠':'🏠', hx, hy);
  ctx.globalAlpha=1;
  // little label
  ctx.fillStyle = litHome ? '#ffd93b' : '#9fb0e6';
  ctx.font='bold 13px sans-serif'; ctx.textAlign='left';
  ctx.fillText(litHome? '  ← our home: DAY ☀️' : '  ← our home: NIGHT 🌙', hx+8, hy-12);
  ctx.textAlign='center';

  // labels: which way is the lean
  ctx.fillStyle='rgba(255,255,255,.8)'; ctx.font='bold 14px sans-serif';
  const leanTxt = state.season>0 ? 'leaning TOWARD the Sun' : state.season<0 ? 'leaning AWAY from the Sun' : 'leaning neither way';
  ctx.fillText(leanTxt, cx, cy+R+26);
  // distance-is-constant reminder
  ctx.fillStyle='rgba(255,255,255,.45)'; ctx.font='12px sans-serif';
  ctx.fillText('(the Sun stays the SAME distance away all year)', cx, cy+R+46);
}

/* ---------- HUD ---------- */
function updateReadout(){
  const a = state.season*TILT;
  const frac = daylightFraction(state.latDeg, a);
  const hrs = frac*24;
  document.getElementById('hours').textContent =
    `☀️ Sun is up about ${hrs.toFixed(1)} hours` + (hrs>=23.9?'  (midnight sun!)':hrs<=0.1?'  (polar night!)':'');
  document.getElementById('barday').style.width = (frac*100).toFixed(1)+'%';
  document.getElementById('barnight').style.width = ((1-frac)*100).toFixed(1)+'%';
}

/* ---------- guided steps ---------- */
const steps = [
  { season:1, lat:51,
    text:"🌍 This is Earth. It SPINS around a tilted line called its axis (the pink dashes). One full spin = one day and one night!",
    note:"The axis is tilted 23.5° and always points the same way in space — toward the North Star (✦). It does not stand up straight." },
  { season:1, lat:51,
    text:"☀️ The Sun shines from the side. The half facing the Sun is DAY (bright). The half turned away is NIGHT (dark). Watch our 🏠 home spin from day into night!",
    note:"Sunlight arrives as near-parallel rays, so exactly half the globe is lit. The day/night boundary (terminator) is the vertical line." },
  { season:1, lat:51,
    text:"🌻 In SUMMER our top leans TOWARD the Sun. So our home's daily circle sits mostly on the bright side — the Sun is up a long time! Long day! ☀️",
    note:"Daylight hours = 1 − arccos(tanφ·tanδ)/π of 24h. At 51°N with δ=+23.5° that's ~16.5 h." },
  { season:-1, lat:51,
    text:"❄️ In WINTER our top leans AWAY from the Sun. Now our circle is mostly on the dark side — short day, long night. And the Sun is just as far away as in summer!",
    note:"Same Earth–Sun distance; only the tilt direction changed. At 51°N with δ=−23.5° daylight is ~7.7 h. Distance does NOT cause seasons." },
  { season:0, lat:51,
    text:"🍂 In spring and autumn we lean NEITHER way. The circle is split evenly — day and night are about equal, 12 hours each.",
    note:"At an equinox δ≈0, so daylight ≈ 12 h at every latitude." },
  { season:1, lat:70,
    text:"🥳 The MORE we lean toward the Sun, the longer the day. Way up north in midsummer the Sun never sets — the midnight sun! That biggest, sunniest day is Midsummer.",
    note:"Above the Arctic Circle (66.5°N) in midsummer the latitude circle never crosses into the dark half → 24 h daylight." },
];
let si = 0;
const dotsBox = document.getElementById('dots');
steps.forEach(()=>{ const d=document.createElement('div'); d.className='dot'; dotsBox.appendChild(d); });
const dotEls=[...dotsBox.children];

function applyStep(){
  const s=steps[si];
  state.season = s.season; state.latDeg = s.lat;
  document.getElementById('lat').value = s.lat;
  document.getElementById('speech').textContent = s.text;
  document.getElementById('grownup').textContent = s.note;
  dotEls.forEach((d,i)=>d.classList.toggle('on', i===si));
  document.getElementById('back').style.visibility = si===0?'hidden':'visible';
  document.getElementById('next').textContent = si===steps.length-1?'↺ Start over':'Next ▶';
  syncSeasonButtons(); syncLatLabel(); updateReadout();
}
function syncSeasonButtons(){
  document.querySelectorAll('.season').forEach(b=>
    b.classList.toggle('on', Number(b.dataset.season)===state.season));
}
function syncLatLabel(){
  const v=state.latDeg;
  const name = v>=66.5?`Arctic (${v}°)`: v>=45?`far north (${v}°)`: v>=20?`middle (${v}°)`:`near equator (${v}°)`;
  document.getElementById('latlbl').textContent = name;
}

document.getElementById('next').onclick=()=>{ si=(si+1)%steps.length; applyStep(); };
document.getElementById('back').onclick=()=>{ if(si>0){si--; applyStep();} };
document.querySelectorAll('.season').forEach(b=> b.onclick=()=>{
  state.season=Number(b.dataset.season); syncSeasonButtons(); updateReadout();
  const t={'1':'☀️ Summer: we lean toward the Sun → the Sun is up a long time. Long day!',
           '0':'🍂 Spring/Autumn: we lean neither way → day and night are about equal.',
           '-1':'❄️ Winter: we lean away from the Sun → short day, long night (same distance!).'}[b.dataset.season];
  document.getElementById('speech').textContent=t;
});
document.getElementById('lat').oninput=e=>{
  state.latDeg=Number(e.target.value); syncLatLabel(); updateReadout();
};
document.getElementById('playBtn').onclick=e=>{
  state.playing=!state.playing;
  e.target.textContent = state.playing?'⏸ Pause spin':'▶ Spin';
};
document.getElementById('ginfo').onclick=()=>
  document.getElementById('grownup').classList.toggle('show');
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault(); document.getElementById('next').click();}
  if(e.key==='ArrowLeft') document.getElementById('back').click();
});

/* ---------- main loop ---------- */
let last=performance.now();
function frame(now){
  const dt=(now-last)/1000; last=now;
  if(state.playing) state.rho = (state.rho + dt*0.7) % (2*Math.PI);
  draw();
  requestAnimationFrame(frame);
}
resize(); applyStep(); requestAnimationFrame(frame);
</script>
</body>
</html>
